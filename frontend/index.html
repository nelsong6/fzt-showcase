<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fzh - Fuzzy Hierarchical Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>fzh</h1>
      <p class="tagline">A fuzzy finder with hierarchical navigation. Type to search, arrow keys to navigate, Enter to drill in or open.</p>
    </header>

    <div class="terminal-window">
      <div class="title-bar">
        <span class="title-icon">C:\&gt;</span>
        <span class="title-text">fzh</span>
        <button id="btn-toggle-yaml" class="toggle-yaml" title="Edit YAML data">YAML</button>
        <div class="window-controls">
          <button class="win-btn win-minimize" aria-label="Minimize">&#x2500;</button>
          <button class="win-btn win-maximize" aria-label="Maximize">&#x25A1;</button>
          <button class="win-btn win-close" aria-label="Close">&#x2715;</button>
        </div>
      </div>
      <pre id="terminal" tabindex="0"></pre>
    </div>

    <div id="yaml-drawer" class="yaml-drawer hidden">
      <div class="drawer-header">
        <span class="drawer-title">Sample Data</span>
        <div class="drawer-actions">
          <button id="btn-sample">reset</button>
          <button id="btn-apply">apply</button>
          <button id="btn-close-yaml" class="btn-close" title="Close">&times;</button>
        </div>
      </div>
      <textarea id="yaml-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <div id="loading" class="loading">Loading fzh WASM...</div>
  <script src="wasm_exec.js"></script>
  <script src="app.js"></script>
</body>
</html>
