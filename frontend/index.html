<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fzh - Fuzzy Hierarchical Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="panel yaml-panel">
      <div class="panel-header">
        <span class="panel-title">YAML</span>
        <div class="panel-actions">
          <button id="btn-sample" title="Load sample data">sample</button>
          <button id="btn-apply" title="Apply YAML changes">apply</button>
        </div>
      </div>
      <textarea id="yaml-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div class="divider"></div>
    <div class="panel terminal-panel">
      <div class="panel-header">
        <span class="panel-title">fzh</span>
      </div>
      <pre id="terminal" tabindex="0"></pre>
    </div>
  </div>
  <div id="loading" class="loading">Loading fzh WASM...</div>
  <script src="wasm_exec.js"></script>
  <script src="app.js"></script>
</body>
</html>
