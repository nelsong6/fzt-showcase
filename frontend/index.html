<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fzt - Fuzzy Hierarchical Finder</title>
  <link rel="stylesheet" href="fzt-terminal.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="ambience-canvas" data-ambience></canvas>
  <div class="page">
    <div class="terminal-window fzt-terminal-window">
      <pre id="terminal" tabindex="0"></pre>
    </div>

    <div id="yaml-drawer" class="yaml-drawer hidden">
      <div class="drawer-header">
        <span class="drawer-title">Sample Data</span>
        <div class="drawer-actions">
          <button id="btn-sample">reset</button>
          <button id="btn-apply">apply</button>
          <button id="btn-close-yaml" class="btn-close" title="Close">&times;</button>
        </div>
      </div>
      <textarea id="yaml-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <div id="loading" class="loading">Loading fzt WASM...</div>
  <script src="wasm_exec.js"></script>
  <script src="ambience-sim.js"></script>
  <script src="ambience-client.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
