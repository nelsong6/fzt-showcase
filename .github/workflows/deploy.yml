name: Deploy Showcase

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout fuzzy-tiered
      uses: actions/checkout@v4
      with:
        repository: nelsong6/fuzzy-tiered
        path: fuzzy-tiered

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: fuzzy-tiered/go.mod

    - name: Build WASM
      working-directory: ./fuzzy-tiered
      run: GOOS=js GOARCH=wasm go build -o ../frontend/fzh.wasm ./cmd/wasm

    - name: Azure Login via OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ vars.ARM_CLIENT_ID }}
        tenant-id: ${{ vars.ARM_TENANT_ID }}
        subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

    - name: Build frontend
      working-directory: ./frontend
      run: |
        mkdir -p dist
        cp index.html style.css app.js wasm_exec.js fzh.wasm dist/

    - name: Get Static Web App Deployment Token
      id: static-web-app-token
      run: |
        TOKEN=$(az staticwebapp secrets list --name fuzzy-tiers-showcase-app --resource-group fuzzy-tiers-showcase-rg --query "properties.apiKey" -o tsv)
        echo "::add-mask::$TOKEN"
        echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Deploy to Azure Static Web App
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ steps.static-web-app-token.outputs.deployment_token }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "./frontend/dist"
        output_location: ""
        skip_app_build: true
