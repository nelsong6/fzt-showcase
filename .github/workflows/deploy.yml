name: Deploy Showcase

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  repository_dispatch:
    types: [fzt-updated]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download fzt assets from latest release
      id: fzt-version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download --repo nelsong6/fzt-terminal --pattern "fzt.wasm" --pattern "fzt-terminal.js" --pattern "fzt-terminal.css" --pattern "fzt-web.js" --dir frontend
        FZT_VERSION=$(gh release view --repo nelsong6/fzt-terminal --json tagName -q '.tagName')
        echo "fzt_version=$FZT_VERSION" >> $GITHUB_OUTPUT
        echo "{\"fztTerminal\":\"$FZT_VERSION\",\"deployedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > frontend/version.json
        echo "Wrote version.json: fzt-terminal $FZT_VERSION"

    - name: Azure Login via OIDC
      uses: azure/login@v3
      with:
        client-id: ${{ vars.ARM_CLIENT_ID }}
        tenant-id: ${{ vars.ARM_TENANT_ID }}
        subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

    - name: Build frontend
      working-directory: ./frontend
      run: |
        mkdir -p dist
        cp index.html style.css app.js fzt-terminal.js fzt-terminal.css fzt-web.js wasm_exec.js fzt.wasm SymbolsNerdFontMono-Regular.ttf PerfectDOSVGA437.ttf version.json dist/

    - name: Get Static Web App Deployment Token
      id: static-web-app-token
      run: |
        TOKEN=$(az staticwebapp secrets list --name fuzzy-tiers-showcase-app --resource-group fuzzy-tiers-showcase-rg --query "properties.apiKey" -o tsv)
        echo "::add-mask::$TOKEN"
        echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Deploy to Azure Static Web App
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ steps.static-web-app-token.outputs.deployment_token }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "./frontend/dist"
        output_location: ""
        skip_app_build: true

    - name: Verify deployment and report version
      env:
        FZT_VERSION: ${{ steps.fzt-version.outputs.fzt_version }}
      run: |
        echo "Verifying version.json is live..."
        for i in $(seq 1 30); do
          LIVE=$(curl -s https://fzh.romaine.life/version.json 2>/dev/null || echo "{}")
          if echo "$LIVE" | grep -q "$FZT_VERSION"; then
            echo "Version verified: $FZT_VERSION"
            curl -s -X POST https://api.romaine.life/ci/deployed \
              -H "Content-Type: application/json" \
              -d "{\"site\":\"fzh.romaine.life\",\"repo\":\"fzt-showcase\",\"versions\":$LIVE}"
            echo "Reported to CI dashboard"
            exit 0
          fi
          echo "Attempt $i: waiting for CDN... (got: $LIVE)"
          sleep 5
        done
        echo "::warning::Version verification timed out — dashboard not updated"
